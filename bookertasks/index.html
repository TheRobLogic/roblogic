<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booker Tasks — Bancroft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --white: #ffffff;
      --red: #d42b2b;
      --yellow: #f5c500;
      --muted: #777;
      --dim: #444;
      --border: #242424;
      --green: #3a9a4a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: var(--white);
      padding: 0.9rem 1.5rem 0.75rem;
      border-bottom: 5px solid var(--red);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .header-left { display: flex; align-items: baseline; gap: 0.6rem; flex-wrap: wrap; }
    .header-venue {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--red);
    }
    .header-slash {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      color: #bbb;
      line-height: 1;
    }
    .header-page {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      letter-spacing: 0.04em;
      line-height: 1;
      color: #111;
    }
    .header-user {
      font-family: 'Special Elite', cursive;
      font-size: 0.78rem;
      background: #111;
      color: #fff;
      padding: 0.25rem 0.6rem;
      border-radius: 2px;
      cursor: pointer;
    }

    /* ── Nav strip ── */
    .nav-strip {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      gap: 0;
      align-items: center;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .nav-strip a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      padding: 0.7rem 1rem;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      display: block;
    }
    .nav-strip a:hover { color: var(--white); }
    .nav-strip a.active { color: var(--white); border-bottom-color: var(--red); }

    /* ── Main ── */
    .main {
      max-width: 820px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }

    /* ── Identity prompt ── */
    #identity-prompt {
      max-width: 400px;
      margin: 3rem auto;
      background: var(--surface);
      border: 2px solid #fff;
      padding: 2rem;
      text-align: center;
    }

    /* ── Add row ── */
    .add-row {
      display: flex;
      margin-bottom: 1.5rem;
      border: 2px solid #fff;
    }
    .add-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.75rem 1rem;
      color: var(--white);
      font-family: 'Special Elite', cursive;
      font-size: 1rem;
      outline: none;
      min-width: 0;
    }
    .add-input::placeholder { color: var(--dim); }
    .btn-add {
      background: var(--red);
      color: #fff;
      border: none;
      padding: 0.75rem 1.2rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-add:active { background: #b52020; }

    /* ── Add options ── */
    .add-options {
      display: none;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 1rem;
      padding: 0 0.2rem;
      flex-wrap: wrap;
    }
    .add-options.open { display: flex; }
    .add-toggle {
      color: var(--muted);
      font-size: 0.75rem;
      cursor: pointer;
      margin-bottom: 0.8rem;
      user-select: none;
    }
    .add-toggle:hover { color: var(--white); }
    .opt-select, .opt-date {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.4rem 0.6rem;
      color: var(--white);
      font-family: inherit;
      font-size: 0.8rem;
      outline: none;
    }
    .opt-label { color: var(--muted); font-size: 0.8rem; }

    /* ── Filters ── */
    .filters {
      display: flex;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .pill {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      padding: 0.5rem 1rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .pill.active { color: #fff; border-bottom-color: var(--red); }
    .pill:hover { color: #fff; }

    /* ── Section label ── */
    .section-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      color: var(--red);
      margin-bottom: 0.5rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── Task list ── */
    .task-list { margin-bottom: 1.5rem; }

    .task-row {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.85rem 0.75rem;
      border-left: 3px solid transparent;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      min-height: 56px;
    }
    .task-row:hover, .task-row:active { background: #161616; }
    .task-row.high { border-left-color: var(--red); }
    .task-row.medium { border-left-color: var(--yellow); }

    .task-check {
      width: 18px;
      height: 18px;
      min-width: 18px;
      accent-color: var(--red);
      cursor: pointer;
      flex-shrink: 0;
    }

    .task-body { flex: 1; min-width: 0; }

    .task-title {
      font-family: 'Special Elite', cursive;
      font-size: 1.05rem;
      color: #fff;
      line-height: 1.35;
    }
    .task-notes-preview {
      font-family: 'Special Elite', cursive;
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .task-meta {
      font-family: 'Special Elite', cursive;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .task-right {
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .briefing-stamp {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      color: var(--dim);
      border: 1px solid var(--dim);
      padding: 0.05rem 0.28rem;
    }

    /* Keep badge classes for modal use */
    .badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      padding: 0.1rem 0.45rem;
    }
    .badge-high { background: rgba(212,43,43,0.15); color: var(--red); border: 1px solid rgba(212,43,43,0.4); }
    .badge-medium { background: rgba(245,197,0,0.15); color: var(--yellow); border: 1px solid rgba(245,197,0,0.3); }
    .badge-low { background: rgba(119,119,119,0.15); color: var(--muted); border: 1px solid #333; }
    .badge-briefing { display: none; } /* replaced by briefing-stamp */

    /* ── Empty / loading ── */
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .empty-state .icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .loading { text-align: center; padding: 3rem; color: var(--muted); }

    /* ── Done section ── */
    .done-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 0.75rem;
      cursor: pointer;
      border-top: 1px solid var(--border);
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .done-header:hover { background: #161616; }
    .done-header .label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      color: var(--green);
    }
    .done-header .arrow { color: var(--muted); font-size: 0.75rem; transition: transform 0.2s; }
    .done-header.open .arrow { transform: rotate(180deg); }
    .done-list { display: none; border-top: none; }
    .done-list.open { display: block; }
    .done-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.5rem 0.75rem;
      opacity: 0.55;
      border-bottom: 1px solid var(--border);
    }
    .done-row .task-title { text-decoration: line-through; font-size: 0.88rem; }
    .done-row .done-meta { font-family: 'Special Elite', cursive; font-size: 0.7rem; color: var(--muted); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--red);
      color: white;
      padding: 0.6rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 1000;
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 100;
      justify-content: center;
      align-items: flex-end;
    }
    .modal-backdrop.open { display: flex; }
    @media (min-width: 600px) {
      .modal-backdrop { align-items: center; padding: 1rem; }
    }

    .modal {
      background: #0f0f0f;
      border: 2px solid #fff;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    @media (min-width: 600px) {
      .modal { max-width: 580px; border: 2px solid #fff; border-radius: 2px; max-height: 85vh; }
    }

    /* Modal header — white block */
    .modal-header-block {
      background: #fff;
      color: #0a0a0a;
      padding: 1rem 1.2rem 0.85rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
    }
    .modal-header-left { flex: 1; min-width: 0; }
    #modal-badge { display: flex; gap: 0.4rem; margin-bottom: 0.35rem; align-items: center; flex-wrap: wrap; }

    #modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.5rem, 5vw, 1.9rem);
      line-height: 1.1;
      color: #0a0a0a;
      letter-spacing: 0.02em;
    }
    #modal-subtitle {
      font-family: 'Special Elite', cursive;
      font-size: 0.8rem;
      color: #666;
      margin-top: 0.25rem;
    }
    #modal-subtitle a { color: #666; text-decoration: none; }
    #modal-subtitle a:hover { color: var(--red); }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #666;
      padding: 0 0.2rem;
      line-height: 1;
      flex-shrink: 0;
      min-width: 32px;
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover { color: #111; }

    /* Modal body */
    .modal-body-inner { padding: 1rem 1.2rem 1.2rem; }

    /* Meta row */
    #modal-meta {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      font-size: 0.78rem;
    }
    .meta-pill {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      padding: 0.15rem 0.5rem;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .meta-due {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      padding: 0.15rem 0.5rem;
      border: 1px solid rgba(245,197,0,0.35);
      color: var(--yellow);
    }
    .meta-links { display: flex; gap: 0.35rem; margin-left: auto; }
    .meta-links a {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      color: #fff;
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 0.15rem 0.5rem;
      min-height: 28px;
      display: flex;
      align-items: center;
    }
    .meta-links a:hover { border-color: #fff; }

    /* Context box */
    #modal-context-wrap {
      background: #161616;
      border-left: 3px solid var(--red);
      padding: 0.8rem 1rem;
      margin-bottom: 1rem;
    }
    .modal-context-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      color: var(--red);
      margin-bottom: 0.3rem;
    }
    #modal-context {
      font-family: 'Special Elite', cursive;
      font-size: 0.88rem;
      line-height: 1.65;
      color: #fff;
    }
    #modal-context a { color: var(--yellow); }

    /* Edit section */
    .modal-edit-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
    }
    .modal-edit-row label { color: var(--muted); font-size: 0.8rem; min-width: 50px; }
    .modal-edit-row select,
    .modal-edit-row input[type="date"],
    .modal-edit-row input[type="text"] {
      background: #161616;
      border: 1px solid var(--border);
      padding: 0.4rem 0.6rem;
      color: #fff;
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
      flex: 1;
    }

    /* Notes area */
    .modal-notes-area {
      border-top: 1px solid var(--border);
      padding-top: 0.9rem;
      margin-top: 0.2rem;
    }
    .modal-section-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    #modal-notes-log { margin-bottom: 0.3rem; }
    .modal-add-note-row {
      display: flex;
      gap: 0;
      border: 1px solid #333;
      margin-top: 0.5rem;
    }
    .modal-notes {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.6rem 0.8rem;
      color: #fff;
      font-family: 'Special Elite', cursive;
      font-size: 0.88rem;
      outline: none;
      resize: none;
      min-height: 44px;
    }
    .modal-notes::placeholder { color: var(--dim); }
    .btn-add-note {
      background: #1e1e1e;
      color: #fff;
      border: none;
      border-left: 1px solid #333;
      padding: 0.6rem 0.9rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      white-space: nowrap;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-add-note:active { background: #2a2a2a; }

    /* Note draft preview */
    .note-draft-preview {
      margin-top: 0.35rem;
      background: #0a0a0a;
      border: 1px solid var(--border);
      padding: 0.5rem 0.7rem;
      color: #fff;
      font-family: 'Special Elite', cursive;
      font-size: 0.82rem;
      line-height: 1.55;
      white-space: pre-wrap;
      display: none;
    }
    .note-draft-preview.open { display: block; }

    /* Action buttons */
    .modal-actions-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      margin-top: 0.8rem;
    }
    .btn-done {
      background: var(--green);
      color: white;
      border: none;
      padding: 0.7rem 1.1rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-done:active { opacity: 0.85; }
    .btn-draft-email {
      background: #162416;
      color: #5c5;
      border: 1px solid #2a4a2a;
      padding: 0.7rem 1.1rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-draft-email:disabled { opacity: 0.5; cursor: default; }
    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.65rem 0.9rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.92rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      min-height: 44px;
    }
    .btn-secondary:hover { border-color: #fff; color: #fff; }
    .btn-nah {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.65rem 0.9rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.92rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      min-height: 44px;
    }
    .btn-nah:hover { color: var(--red); border-color: var(--red); }
    .btn-danger {
      background: none;
      color: var(--red);
      border: 1px solid var(--red);
      padding: 0.65rem 0.9rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.92rem;
      cursor: pointer;
      min-height: 44px;
      margin-left: auto;
    }
    .btn-danger:hover { background: rgba(212,43,43,0.1); }

    /* Draft section */
    #modal-draft-section {
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      margin-top: 0.5rem;
    }
    #modal-draft-output {
      background: #0a0a0a;
      border: 1px solid rgba(92,204,92,0.2);
      padding: 0.9rem;
      color: #fff;
      font-family: 'Special Elite', cursive;
      font-size: 0.88rem;
      line-height: 1.7;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }

    /* Mobile ── */
    @media (max-width: 480px) {
      .header { padding: 0.7rem 0.75rem; }
      .main { padding: 1rem 0.75rem; }
      .nav-strip { padding: 0 0.5rem; }
      .task-title { font-size: 0.98rem; }
      .modal-body-inner { padding: 0.9rem 1rem 1rem; }
      .btn-done, .btn-draft-email { padding: 0.7rem 0.9rem; font-size: 0.92rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <span class="header-venue">Bancroft</span>
      <span class="header-slash">/</span>
      <span class="header-page">Booking Tasks</span>
    </div>
    <span class="header-user" id="user-name" onclick="window._changeIdentity()">...</span>
  </div>
  <div class="nav-strip">
    <a href="/bookersummary/">Briefing</a>
    <a href="/bookertasks/" class="active">Tasks</a>
    <a href="/bancroftbandlist/">Band List</a>
    <a href="/bookersummary/archive.html">Archive</a>
    <a href="/bookertasks/guide.html">Guide</a>
    <a href="https://bancroftbar.com" target="_blank">Bar Website</a>
  </div>

  <div class="main">

  <p class="meta-line" id="meta-line">Loading... </p>

  <div id="identity-prompt" style="display:none; justify-content:center; align-items:center; gap:1rem; padding:2rem; margin-bottom:1.5rem; background:var(--surface); border:2px solid #fff; flex-direction:column;">
    <div style="color:#fff; font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:0.06em;">Who are you?</div>
    <div style="display:flex; gap:1rem;">
      <button onclick="window._setIdentity('rob')" style="background:var(--red); color:white; border:none; padding:0.8rem 2rem; font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:0.08em; cursor:pointer;">Rob</button>
      <button onclick="window._setIdentity('kayla')" style="background:var(--red); color:white; border:none; padding:0.8rem 2rem; font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:0.08em; cursor:pointer;">Kayla</button>
    </div>
  </div>

  <div class="add-row">
    <input type="text" class="add-input" id="add-input" placeholder="Add a task..." autocomplete="off">
    <button class="btn-add" id="btn-add">+ Add</button>
  </div>
  <div class="add-toggle" id="add-toggle">More options...</div>
  <div class="add-options" id="add-options">
    <span class="opt-label">Priority:</span>
    <select class="opt-select" id="opt-priority">
      <option value="medium">Medium</option>
      <option value="high">High</option>
      <option value="low">Low</option>
    </select>
    <span class="opt-label">Due:</span>
    <input type="date" class="opt-date" id="opt-due">
  </div>

  <div class="filters" id="filters"></div>

  <div id="task-list" class="task-list">
    <div class="loading">Loading tasks...</div>
  </div>

  <div class="done-header" id="done-header" style="display:none">
    <span class="label" id="done-label"></span>
    <span class="arrow">&#9660;</span>
  </div>
  <div class="done-list" id="done-list"></div>

  </div><!-- /.main -->

  <div class="toast" id="toast"></div>

  <!-- Detail Modal -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" id="modal">
      <div class="modal-header-block">
        <div class="modal-header-left">
          <span id="modal-badge"></span>
          <div id="modal-title"></div>
          <div id="modal-subtitle"></div>
        </div>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body-inner">
      <div id="modal-meta"></div>
      <div id="modal-context-wrap" style="display:none">
        <div class="modal-context-label">Context from briefing</div>
        <p id="modal-context"></p>
      </div>

      <div id="modal-edit-section" style="display:none">
        <div class="modal-edit-row">
          <label>Title:</label>
          <input type="text" id="modal-edit-title">
        </div>
        <div class="modal-edit-row">
          <label>Priority:</label>
          <select id="modal-edit-priority">
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <label>Due:</label>
          <input type="date" id="modal-edit-due">
        </div>
      </div>

      <div class="modal-notes-area">
        <div class="modal-section-label" style="margin-top:0;">Notes</div>
        <div id="modal-notes-log"></div>
        <div class="modal-add-note-row">
          <textarea class="modal-notes" id="modal-notes-input" placeholder="Add a note..."></textarea>
          <button class="btn-add-note" id="modal-btn-add-note">Add Note</button>
        </div>
      </div>

      <div class="modal-actions-row" id="modal-actions">
        <button class="btn-done" id="modal-btn-done">Mark Done</button>
        <button class="btn-draft-email" id="modal-btn-draft">Draft Email</button>
        <button class="btn-secondary" id="modal-btn-edit">Edit</button>
        <button class="btn-nah" id="modal-btn-nah">Nah</button>
        <button class="btn-danger" id="modal-btn-delete" style="display:none">Delete</button>
      </div>

      <div id="modal-draft-section" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
          <div style="font-family:'Bebas Neue',sans-serif; font-size:0.7rem; letter-spacing:0.14em; color:var(--green);">Email Draft</div>
          <button id="modal-btn-copy" style="background:var(--green); color:white; border:none; padding:0.3rem 0.8rem; font-family:'Bebas Neue',sans-serif; font-size:0.8rem; letter-spacing:0.06em; cursor:pointer;">Copy</button>
        </div>
        <div id="modal-draft-output"></div>
      </div>
      </div><!-- /.modal-body-inner -->
    </div>
  </div>

<script>
(function() {
  'use strict';

  const API = '/bookertasks/api';
  let tasks = [];
  let history = [];
  let currentUser = localStorage.getItem('booker-user') || '';
  let currentFilter = 'all';
  let modalTaskId = null;
  let editMode = false;

  // --- Identity ---

  function ensureIdentity() {
    if (currentUser) {
      document.getElementById('user-name').textContent = currentUser;
      document.getElementById('identity-prompt').style.display = 'none';
      return true;
    }
    document.getElementById('identity-prompt').style.display = 'flex';
    document.getElementById('task-list').innerHTML = '';
    return false;
  }

  window._setIdentity = function(name) {
    currentUser = name;
    localStorage.setItem('booker-user', name);
    document.getElementById('user-name').textContent = name;
    document.getElementById('identity-prompt').style.display = 'none';
    loadTasks();
  };

  window._changeIdentity = function() {
    localStorage.removeItem('booker-user');
    currentUser = '';
    document.getElementById('identity-prompt').style.display = 'flex';
  };

  // --- API helpers ---

  async function api(action, method, body) {
    const opts = { method, headers: {
      'Content-Type': 'application/json',
      'X-Booker-User': currentUser,
    }};
    if (body) opts.body = JSON.stringify(body);
    try {
      const r = await fetch(`${API}/${action}`, opts);
      const data = await r.json();
      if (!data.success && data.success !== undefined) {
        showToast(data.error || 'Something went wrong');
        return null;
      }
      return data;
    } catch (e) {
      showToast('Could not reach server');
      return null;
    }
  }

  async function loadTasks() {
    if (!ensureIdentity()) return;
    const data = await api('list', 'GET');
    if (!data) return;
    tasks = data.tasks || [];
    history = data.history || [];
    document.getElementById('user-name').textContent = currentUser;
    updateMeta();
    renderFilters();
    renderTasks();
  }

  // --- Rendering ---

  function updateMeta() {
    const now = new Date();
    const time = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    document.getElementById('meta-line').innerHTML =
      `Last refreshed: ${time} &bull; <a onclick="window._refresh()">Refresh</a>`;
  }

  function renderFilters() {
    const active = tasks.filter(t => t.status === 'active');
    const counts = { all: active.length, high: 0, medium: 0, low: 0 };
    active.forEach(t => { if (counts[t.priority] !== undefined) counts[t.priority]++; });

    const el = document.getElementById('filters');
    el.innerHTML = ['all', 'high', 'medium', 'low'].map(f => {
      const label = f === 'all' ? 'All' : f.charAt(0).toUpperCase() + f.slice(1);
      const cls = currentFilter === f ? 'pill active' : 'pill';
      return `<button class="${cls}" data-filter="${f}" onclick="window._setFilter('${f}')">${label} (${counts[f]})</button>`;
    }).join('');
  }

  function renderTasks() {
    const el = document.getElementById('task-list');
    const active = tasks
      .filter(t => t.status === 'active')
      .filter(t => currentFilter === 'all' || t.priority === currentFilter);

    // Sort: high first, then by due (soonest), then by created
    const prio = { high: 0, medium: 1, low: 2 };
    active.sort((a, b) => {
      if (prio[a.priority] !== prio[b.priority]) return prio[a.priority] - prio[b.priority];
      if (a.due && b.due) return a.due.localeCompare(b.due);
      if (a.due) return -1;
      if (b.due) return 1;
      return a.created_at.localeCompare(b.created_at);
    });

    if (active.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="icon">&#9745;</div>No tasks' +
        (currentFilter !== 'all' ? ' matching this filter' : '') + '</div>';
    } else {
      el.innerHTML = active.map(t => taskRowHTML(t)).join('');
    }

    // Done section
    const done = tasks.filter(t => t.status === 'done');
    const doneHeader = document.getElementById('done-header');
    const doneList = document.getElementById('done-list');

    if (done.length === 0) {
      doneHeader.style.display = 'none';
      doneList.innerHTML = '';
    } else {
      doneHeader.style.display = 'flex';
      document.getElementById('done-label').innerHTML = `&#10003; Done (${done.length})`;
      doneList.innerHTML = done
        .sort((a, b) => (b.completed_at || '').localeCompare(a.completed_at || ''))
        .map(t => {
          const when = t.completed_at ? formatDate(t.completed_at) : '';
          const who = t.completed_by || '?';
          return `<div class="done-row">
            <input type="checkbox" class="task-check" checked disabled>
            <div>
              <div class="task-title">${esc(t.title)}</div>
              <div class="done-meta">Completed by ${esc(who)}, ${when}</div>
            </div>
          </div>`;
        }).join('');
    }
  }

  function taskRowHTML(t) {
    const prioClass = t.priority === 'high' ? ' high' : '';
    const prioBadge = `<span class="badge badge-${t.priority}">${t.priority === 'medium' ? 'MED' : t.priority.toUpperCase()}</span>`;
    const srcBadge = t.source === 'briefing' ? ' <span class="badge badge-briefing">BRIEFING</span>' : '';
    const noteLog = parseNotes(t.notes);
    const lastNote = noteLog.length ? noteLog[noteLog.length - 1] : null;
    const notes = lastNote ? `<div class="task-notes-preview">${esc(lastNote.text)}</div>` : '';
    const due = t.due ? `Due: ${t.due}` : '';
    const by = `Added by ${t.created_by}, ${formatDate(t.created_at)}`;
    const meta = [due, by].filter(Boolean).join(' &bull; ');

    return `<div class="task-row${prioClass}" data-id="${t.id}" onclick="window._openModal('${t.id}')">
      <input type="checkbox" class="task-check" onclick="event.stopPropagation(); window._toggleDone('${t.id}')">
      <div class="task-body">
        <div class="task-title-line">
          <span class="task-title">${esc(t.title)}</span>
          ${prioBadge}${srcBadge}
        </div>
        ${notes}
        <div class="task-meta">${meta}</div>
      </div>
    </div>`;
  }

  // --- Actions ---

  window._refresh = async function() {
    document.getElementById('task-list').innerHTML = '<div class="loading">Refreshing...</div>';
    await loadTasks();
  };

  window._setFilter = function(f) {
    currentFilter = f;
    renderFilters();
    renderTasks();
  };

  window._toggleDone = async function(id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    const newStatus = t.status === 'active' ? 'done' : 'active';

    // Optimistic update
    t.status = newStatus;
    if (newStatus === 'done') {
      t.completed_at = new Date().toISOString();
      t.completed_by = currentUser;
    } else {
      t.completed_at = null;
      t.completed_by = null;
    }
    renderFilters();
    renderTasks();

    const data = await api('update', 'POST', { id, status: newStatus });
    if (!data) {
      // Revert
      t.status = newStatus === 'done' ? 'active' : 'done';
      renderFilters();
      renderTasks();
    }
  };

  // --- Add task ---

  document.getElementById('btn-add').addEventListener('click', addTask);
  document.getElementById('add-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  async function addTask() {
    const input = document.getElementById('add-input');
    const title = input.value.trim();
    if (!title) return;

    const priority = document.getElementById('opt-priority').value;
    const due = document.getElementById('opt-due').value || null;

    input.value = '';

    const data = await api('add', 'POST', { title, priority, due, notes: '', context: '' });
    if (data && data.task) {
      tasks.push(data.task);
      renderFilters();
      renderTasks();
    }
  }

  // Add options toggle
  document.getElementById('add-toggle').addEventListener('click', function() {
    const opts = document.getElementById('add-options');
    const isOpen = opts.classList.toggle('open');
    this.textContent = isOpen ? 'Fewer options' : 'More options...';
  });

  // --- Done section toggle ---

  document.getElementById('done-header').addEventListener('click', function() {
    this.classList.toggle('open');
    document.getElementById('done-list').classList.toggle('open');
  });

  // --- Modal ---

  window._openModal = function(id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    modalTaskId = id;
    editMode = false;

    document.getElementById('modal-badge').innerHTML =
      `<span class="badge badge-${t.priority}">${t.priority.toUpperCase()}</span>` +
      (t.source === 'briefing' ? ' <span class="badge badge-briefing">BRIEFING</span>' : '');

    // Parse title into action + contact + email + subject
    // Formats: "Reply to Name <email> re: Subject" or "Review inquiry from Name re: Subject"
    const parsed = parseTitleParts(t.title);

    // Title: just the action verb + contact name
    document.getElementById('modal-title').textContent = parsed.action + parsed.contact;

    // Subtitle: subject (stripped of Re:/Fwd: noise) + mailto link
    let subtitleHtml = '';
    if (parsed.subject) subtitleHtml += `<span>${esc(parsed.subject)}</span>`;
    if (parsed.email) {
      if (subtitleHtml) subtitleHtml += '&ensp;';
      subtitleHtml += `<a href="mailto:${esc(parsed.email)}" title="${esc(parsed.email)}">✉ ${esc(parsed.email)}</a>`;
    }
    document.getElementById('modal-subtitle').innerHTML = subtitleHtml;

    // Meta row: source pill, due date, links
    const srcPill = t.source === 'briefing'
      ? `<span class="meta-pill">Briefing</span>`
      : `<span class="meta-pill">Manual</span>`;
    const dueHtml = t.due ? `<span class="meta-due">Due ${t.due}</span>` : '';

    // Links: real URLs from context, fallback to search for bands with genre
    const contextUrls = t.context ? extractUrls(t.context) : [];
    const hasGenre = t.context && /genre:/i.test(t.context);
    let linksHtml = '';
    if (contextUrls.length > 0) {
      const linkTags = contextUrls.slice(0, 3).map(u => {
        const label = u.includes('bandcamp') ? 'Bandcamp'
          : u.includes('spotify') ? 'Spotify'
          : u.includes('youtube') ? 'YouTube'
          : u.includes('instagram') ? 'IG'
          : u.includes('facebook') ? 'FB' : 'Link';
        return `<a href="${u}" target="_blank" rel="noopener">${label}</a>`;
      }).join('');
      linksHtml = `<span class="meta-links">${linkTags}</span>`;
    } else if (parsed.contact && hasGenre) {
      linksHtml = `<span class="meta-links">
        <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(parsed.contact)}" target="_blank" rel="noopener">YouTube</a>
        <a href="https://www.google.com/search?q=${encodeURIComponent(parsed.contact + ' band')}" target="_blank" rel="noopener">Google</a>
      </span>`;
    }

    document.getElementById('modal-meta').innerHTML = srcPill + dueHtml + linksHtml;

    // Context (with clickable links)
    const ctxWrap = document.getElementById('modal-context-wrap');
    if (t.context) {
      ctxWrap.style.display = 'block';
      document.getElementById('modal-context').innerHTML = linkifyUrls(esc(t.context));
    } else {
      ctxWrap.style.display = 'none';
    }

    // Notes log
    renderNoteLog(t);
    document.getElementById('modal-notes-input').value = '';

    // Edit fields
    document.getElementById('modal-edit-section').style.display = 'none';
    document.getElementById('modal-edit-title').value = t.title;
    document.getElementById('modal-edit-priority').value = t.priority;
    document.getElementById('modal-edit-due').value = t.due || '';

    // Buttons
    const btnDone = document.getElementById('modal-btn-done');
    if (t.status === 'done') {
      btnDone.textContent = 'Undo';
    } else {
      btnDone.textContent = 'Mark Done';
    }
    document.getElementById('modal-btn-delete').style.display = 'none';
    document.getElementById('modal-btn-edit').textContent = 'Edit';
    document.getElementById('modal-draft-section').style.display = 'none';
    document.getElementById('modal-btn-draft').textContent = 'Draft Email';
    document.getElementById('modal-btn-draft').disabled = false;

    document.getElementById('modal-backdrop').classList.add('open');
  };

  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
    modalTaskId = null;
    editMode = false;
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-backdrop')) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  // Add Note button
  document.getElementById('modal-btn-add-note').addEventListener('click', async function() {
    if (!modalTaskId) return;
    const input = document.getElementById('modal-notes-input');
    const text = input.value.trim();
    if (!text) return;
    await addNoteToTask(modalTaskId, text);
    input.value = '';
  });

  // Enter key in note input (shift+enter for newline)
  document.getElementById('modal-notes-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('modal-btn-add-note').click();
    }
  });

  // Mark Done from modal
  document.getElementById('modal-btn-done').addEventListener('click', async function() {
    if (!modalTaskId) return;
    await window._toggleDone(modalTaskId);
    closeModal();
  });

  // Edit toggle
  document.getElementById('modal-btn-edit').addEventListener('click', function() {
    editMode = !editMode;
    document.getElementById('modal-edit-section').style.display = editMode ? 'block' : 'none';
    document.getElementById('modal-btn-delete').style.display = editMode ? 'inline-block' : 'none';
    this.textContent = editMode ? 'Save' : 'Edit';

    if (!editMode) {
      // Save edits
      saveEdits();
    }
  });

  async function saveEdits() {
    if (!modalTaskId) return;
    const t = tasks.find(x => x.id === modalTaskId);
    if (!t) return;

    const newTitle = document.getElementById('modal-edit-title').value.trim();
    const newPriority = document.getElementById('modal-edit-priority').value;
    const newDue = document.getElementById('modal-edit-due').value || null;

    const updates = {};
    if (newTitle && newTitle !== t.title) { updates.title = newTitle; t.title = newTitle; }
    if (newPriority !== t.priority) { updates.priority = newPriority; t.priority = newPriority; }
    if (newDue !== t.due) { updates.due = newDue; t.due = newDue; }

    if (Object.keys(updates).length > 0) {
      updates.id = modalTaskId;
      await api('update', 'POST', updates);
      renderFilters();
      renderTasks();
    }
  }

  // Delete from modal
  document.getElementById('modal-btn-delete').addEventListener('click', async function() {
    if (!modalTaskId) return;
    if (!confirm('Delete this task? This cannot be undone.')) return;

    const data = await api('delete', 'POST', { id: modalTaskId });
    if (data) {
      tasks = tasks.filter(t => t.id !== modalTaskId);
      renderFilters();
      renderTasks();
      closeModal();
    }
  });

  // --- Nah (pass on this task) ---

  document.getElementById('modal-btn-nah').addEventListener('click', async function() {
    if (!modalTaskId) return;
    await addNoteToTask(modalTaskId, 'Passed');
    await window._toggleDone(modalTaskId);
    closeModal();
  });

  // --- Email Draft ---

  document.getElementById('modal-btn-draft').addEventListener('click', async function() {
    if (!modalTaskId) return;
    const t = tasks.find(x => x.id === modalTaskId);
    if (!t) return;

    const btn = this;
    const section = document.getElementById('modal-draft-section');
    const output = document.getElementById('modal-draft-output');

    // Gather notes log + any text in the input as direction
    const noteLog = parseNotes(t.notes);
    const logText = noteLog.map(n => n.text).join('\n');
    const inputText = document.getElementById('modal-notes-input').value || '';
    const allNotes = [logText, inputText].filter(Boolean).join('\n');

    btn.textContent = 'Generating...';
    btn.disabled = true;
    section.style.display = 'block';
    output.textContent = 'Thinking...';

    const data = await api('draft-email', 'POST', {
      title: t.title,
      context: t.context || '',
      notes: allNotes,
    });

    btn.textContent = 'Draft Email';
    btn.disabled = false;

    if (data && data.draft) {
      output.textContent = data.draft;
      // Save "Email drafted" note with the actual draft text embedded
      await addNoteToTask(modalTaskId, 'Email drafted', data.draft);
    } else {
      output.textContent = 'Failed to generate draft. Try again.';
    }
  });

  document.getElementById('modal-btn-copy').addEventListener('click', function() {
    const text = document.getElementById('modal-draft-output').textContent;
    navigator.clipboard.writeText(text).then(() => {
      this.textContent = 'Copied!';
      setTimeout(() => { this.textContent = 'Copy'; }, 1500);
    });
  });

  // --- Notes helpers ---

  // Notes are stored as a JSON array string: [{"text":"...", "by":"rob", "at":"2026-03-14T..."}]
  // Email drafts include a "draft" field: {"text":"Email drafted", "draft":"...", "by":..., "at":...}
  // Legacy: if notes is a plain string, treat it as a single entry
  function parseNotes(notes) {
    if (!notes) return [];
    try {
      const parsed = JSON.parse(notes);
      if (Array.isArray(parsed)) {
        // Filter out placeholder entries
        return parsed.filter(n => n.text && n.text.trim() && n.text !== '?');
      }
    } catch (e) {}
    // Legacy string — skip placeholders
    if (!notes.trim() || notes.trim() === '?') return [];
    return [{ text: notes, by: '?', at: '' }];
  }

  let _draftExpandIds = new Set();

  function renderNoteLog(task) {
    const el = document.getElementById('modal-notes-log');
    const log = parseNotes(task.notes);
    if (log.length === 0) {
      el.innerHTML = '';
      return;
    }
    el.innerHTML = log.map((n, i) => {
      const when = n.at ? formatDate(n.at) : '';
      const who = n.by || '?';
      const isEmailDraft = n.text === 'Email drafted' && n.draft;
      const draftId = `draft-${task.id}-${i}`;
      const isOpen = _draftExpandIds.has(draftId);

      if (isEmailDraft) {
        return `<div style="padding:0.45rem 0; border-bottom:1px solid var(--border); font-size:0.82rem;">
          <span style="color:var(--yellow); font-style:italic; cursor:pointer;" onclick="window._toggleDraft('${draftId}')">
            Email drafted ${isOpen ? '▴' : '▾'}
          </span>
          <span style="color:var(--muted); font-size:0.7rem; margin-left:0.5rem;">${esc(who)}, ${when}</span>
          <div id="${draftId}" class="note-draft-preview${isOpen ? ' open' : ''}">${esc(n.draft)}</div>
        </div>`;
      }

      return `<div style="padding:0.45rem 0; border-bottom:1px solid var(--border); font-size:0.82rem;">
        <span style="color:var(--white);">${esc(n.text)}</span>
        <span style="color:var(--muted); font-size:0.7rem; margin-left:0.5rem;">${esc(who)}, ${when}</span>
      </div>`;
    }).join('');
  }

  window._toggleDraft = function(id) {
    const el = document.getElementById(id);
    if (!el) return;
    if (_draftExpandIds.has(id)) {
      _draftExpandIds.delete(id);
      el.classList.remove('open');
      // update arrow
      const span = el.previousElementSibling;
      if (span) span.innerHTML = span.innerHTML.replace('▴', '▾');
    } else {
      _draftExpandIds.add(id);
      el.classList.add('open');
      const span = el.previousElementSibling;
      if (span) span.innerHTML = span.innerHTML.replace('▾', '▴');
    }
  };

  async function addNoteToTask(taskId, text, draft) {
    const t = tasks.find(x => x.id === taskId);
    if (!t) return;
    const log = parseNotes(t.notes);
    const entry = { text, by: currentUser, at: new Date().toISOString() };
    if (draft) entry.draft = draft;
    log.push(entry);
    const newNotes = JSON.stringify(log);
    t.notes = newNotes;
    await api('update', 'POST', { id: taskId, notes: newNotes });
    renderNoteLog(t);
    renderTasks();
  }

  // --- Title parsing ---

  function parseTitleParts(title) {
    // Returns { action, contact, email, subject }
    // Handles: "Reply to Name <email> re: Subject"
    //          "Review inquiry from Name <email> re: Subject"
    //          "Check if Name available April 5" (manual tasks)
    let action = '', contact = title, email = null, subject = null;

    for (const prefix of ['Reply to ', 'Review inquiry from ']) {
      if (title.startsWith(prefix)) {
        action = prefix;
        contact = title.slice(prefix.length);
        break;
      }
    }

    // Extract email in angle brackets
    const emailMatch = contact.match(/<([^>]+@[^>]+)>/);
    if (emailMatch) {
      email = emailMatch[1];
      contact = contact.replace(emailMatch[0], '').trim();
    }

    // Extract subject after " re: "
    const reIdx = contact.indexOf(' re: ');
    if (reIdx > 0) {
      subject = contact.slice(reIdx + 5);
      contact = contact.slice(0, reIdx).trim();
      // Strip leading Re:/Fwd: chains from subject
      subject = subject.replace(/^(Re:\s*|Fwd:\s*)+/i, '').trim();
    }

    return { action, contact, email, subject };
  }

  // --- Band name + link helpers ---

  function extractBandName(title) {
    // "Reply to Contact Name <email> re: subject" or "Review inquiry from Contact re: subject"
    let name = title;
    for (const prefix of ['Reply to ', 'Review inquiry from ']) {
      if (name.startsWith(prefix)) name = name.slice(prefix.length);
    }
    // Strip email in angle brackets
    name = name.replace(/<[^>]+>/g, '').trim();
    // Take everything before " re:"
    const reIdx = name.indexOf(' re:');
    if (reIdx > 0) name = name.slice(0, reIdx).trim();
    return name || null;
  }

  function extractUrls(text) {
    const matches = text.match(/https?:\/\/[^\s<>,]+/g);
    return matches || [];
  }

  function linkifyUrls(text) {
    // Find URLs in text and wrap them as clickable links
    return text.replace(
      /(https?:\/\/[^\s<>,]+)/g,
      '<a href="$1" target="_blank" rel="noopener" style="color:var(--yellow); word-break:break-all;">$1</a>'
    );
  }

  // --- Helpers ---

  function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  // --- Init ---
  // Notify Rob that someone opened the checklist
  fetch('https://ntfy.sh/roblogic-claude', {
    method: 'POST',
    headers: { 'Title': 'Booker Tasks opened', 'Tags': 'clipboard' },
    body: (currentUser || 'unknown') + ' opened the checklist',
  }).catch(() => {});

  loadTasks();

})();
</script>
