<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Results — Bancroft</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #f0f5fa;
      color: #1a1a2e;
      font-size: 18px;
      line-height: 1.4;
      padding: 20px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a365d;
      margin-bottom: 4px;
    }
    .meta {
      font-size: 16px;
      color: #4a6fa5;
      margin-bottom: 20px;
    }
    .meta strong { color: #1a365d; }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      background: #3b82b6;
      padding: 10px 14px;
      margin-top: 24px;
      border-radius: 6px 6px 0 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 2px;
      background: #fff;
    }
    th {
      background: #dbeafe;
      color: #1e40af;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 8px 12px;
      text-align: center;
      border: 1px solid #bfdbfe;
    }
    th:first-child { text-align: left; }
    td {
      padding: 8px 12px;
      border: 1px solid #e2e8f0;
      font-size: 18px;
    }
    td:first-child {
      font-weight: 600;
      color: #1a365d;
    }
    td:not(:first-child) {
      text-align: center;
      font-weight: 700;
      font-size: 20px;
    }
    tr:nth-child(even) { background: #f8fafc; }
    tr:hover { background: #eff6ff; }

    .val-fill {
      color: #1e40af;
      font-size: 22px;
    }
    .val-zero {
      color: #cbd5e1;
    }

    .eighty-sixed td:first-child {
      text-decoration: line-through;
      color: #94a3b8;
    }
    .eighty-sixed td {
      background: #fef2f2;
    }
    .eighty-sixed-badge {
      display: inline-block;
      background: #dc2626;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 8px;
      margin-left: 6px;
    }

    .added td:first-child { font-style: italic; }
    .added-badge {
      display: inline-block;
      background: #16a34a;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 8px;
      margin-left: 6px;
    }

    .notes-box {
      background: #fff;
      border: 2px solid #bfdbfe;
      border-radius: 6px;
      padding: 16px;
      margin-top: 24px;
      font-size: 18px;
      white-space: pre-wrap;
    }
    .notes-box strong {
      color: #1e40af;
      font-size: 20px;
    }
    .notes-empty { color: #94a3b8; font-style: italic; }

    .summary {
      background: #dbeafe;
      border: 2px solid #93c5fd;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      font-size: 16px;
    }
    .summary-item { }
    .summary-item .num {
      font-size: 28px;
      font-weight: 800;
      color: #1e40af;
    }
    .summary-item .label { color: #4a6fa5; }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #94a3b8;
      font-size: 20px;
    }
    .empty-state h2 { color: #64748b; margin-bottom: 8px; }

    #loading {
      text-align: center;
      padding: 80px 20px;
      color: #4a6fa5;
      font-size: 20px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .file-picker select {
      font-size: 16px;
      padding: 8px 12px;
      border: 2px solid #93c5fd;
      border-radius: 6px;
      background: #fff;
      color: #1a365d;
    }
    .auto-badge {
      font-size: 13px;
      color: #16a34a;
      background: #dcfce7;
      border: 1px solid #86efac;
      border-radius: 12px;
      padding: 3px 10px;
      font-weight: 600;
    }
    .auto-badge.stale {
      color: #b45309;
      background: #fef3c7;
      border-color: #fcd34d;
    }
  </style>
</head>
<body>

<h1>Inventory Count</h1>
<div class="toolbar">
  <div class="file-picker">
    <select id="archive-picker" onchange="loadFromPicker()">
      <option value="">Latest</option>
    </select>
  </div>
  <span id="live-badge" class="auto-badge" style="display:none;">Live — auto-updating</span>
</div>
<div id="app"><div id="loading">Loading latest count...</div></div>

<script>
const API_BASE = '/inventory/api';
let currentFile = null;
let lastSubmittedAt = null;
let pollTimer = null;

const SECTION_NAMES = {
  draft: 'Draft / On Tap',
  bottles_cans: 'Bottles & Cans',
  well_spirits: 'Well Spirits',
  whiskey: 'Whiskey / Bourbon / Scotch / Irish',
  tequila: 'Tequila / Mezcal',
  vodka: 'Vodka',
  rum: 'Rum',
  gin: 'Gin',
  liqueur: 'Liqueur / Cordial / Dekuyper',
  bar_supplies: 'Soda / Juice / Supplies'
};

const SECTION_COLS = {
  draft:        [['bar','Tapped'],['walkin','Backup']],
  bottles_cans: [['bar','Bar'],['cases','Cases'],['loose','Loose']],
  well_spirits: [['well1','Well 1'],['well2','Well 2'],['bar','Bar'],['room','Room']],
  whiskey:      [['open','Open'],['backup','Backup'],['room','Room']],
  tequila:      [['open','Open'],['backup','Backup'],['room','Room']],
  vodka:        [['open','Open'],['backup','Backup'],['room','Room']],
  rum:          [['open','Open'],['backup','Backup'],['room','Room']],
  gin:          [['open','Open'],['backup','Backup'],['room','Room']],
  liqueur:      [['open','Open'],['backup','Backup'],['room','Room']],
  bar_supplies: [['bar','Bar'],['back','Back']]
};

function formatVal(v) {
  if (v === undefined || v === null || v === '') return '<span class="val-zero">—</span>';
  if (['F','½','¼','K'].includes(v)) return '<span class="val-fill">' + v + '</span>';
  if (v === '0' || v === 0) return '<span class="val-zero">0</span>';
  return v;
}

function renderCount(data) {
  const app = document.getElementById('app');
  const ts = new Date(data.submitted_at);
  const dateStr = ts.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  const timeStr = ts.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

  const counted = data.progress ? data.progress.counted : 0;
  const total = data.progress ? data.progress.total : '?';
  const eightySixed = data.eighty_sixed || [];
  const device = data.device || 'unknown';

  let html = '';
  html += '<div class="meta">' + dateStr + ' at ' + timeStr + ' &nbsp;·&nbsp; <strong>' + device + '</strong> &nbsp;·&nbsp; ' + counted + ' of ' + total + ' counted</div>';

  html += '<div class="summary">';
  html += '<div class="summary-item"><div class="num">' + counted + '</div><div class="label">Counted</div></div>';
  html += '<div class="summary-item"><div class="num">' + eightySixed.length + '</div><div class="label">86\'d</div></div>';
  let addedCount = 0;
  Object.values(data.sections || {}).forEach(s => { addedCount += (s.added || []).length; });
  html += '<div class="summary-item"><div class="num">' + addedCount + '</div><div class="label">Added</div></div>';
  html += '</div>';

  // 86'd items
  if (eightySixed.length > 0) {
    html += '<div class="section-title" style="background:#dc2626;">86\'d Items — Remove From List</div>';
    html += '<table><thead><tr><th>Item</th><th>Section</th></tr></thead><tbody>';
    eightySixed.forEach(item => {
      html += '<tr class="eighty-sixed"><td>' + item.name + '</td><td style="font-size:14px;color:#64748b;">' + (SECTION_NAMES[item.section] || item.section) + '</td></tr>';
    });
    html += '</tbody></table>';
  }

  // Sections with data
  const sectionOrder = Object.keys(SECTION_NAMES);
  sectionOrder.forEach(secId => {
    const sec = (data.sections || {})[secId];
    if (!sec) return;
    const items = sec.items || [];
    const added = sec.added || [];
    if (items.length === 0 && added.length === 0) return;

    const cols = SECTION_COLS[secId] || [];
    html += '<div class="section-title">' + (SECTION_NAMES[secId] || secId) + '</div>';
    html += '<table><thead><tr><th>Item</th>';
    cols.forEach(c => { html += '<th>' + c[1] + '</th>'; });
    html += '</tr></thead><tbody>';

    items.forEach(item => {
      html += '<tr>';
      html += '<td>' + item.name + '</td>';
      cols.forEach(c => { html += '<td>' + formatVal(item[c[0]]) + '</td>'; });
      html += '</tr>';
    });

    added.forEach(item => {
      html += '<tr class="added">';
      html += '<td>' + (item.name || '?') + '<span class="added-badge">NEW</span></td>';
      cols.forEach(c => { html += '<td>' + formatVal(item[c[0]]) + '</td>'; });
      html += '</tr>';
    });

    html += '</tbody></table>';
  });

  // Notes
  html += '<div class="notes-box"><strong>Notes</strong><br>';
  if (data.notes && data.notes.trim()) {
    html += data.notes;
  } else {
    html += '<span class="notes-empty">No notes</span>';
  }
  html += '</div>';

  app.innerHTML = html;
}

async function loadCount(file) {
  try {
    const url = file
      ? API_BASE + '/count?file=' + encodeURIComponent(file)
      : API_BASE + '/latest';
    const resp = await fetch(url);
    if (resp.ok) {
      const data = await resp.json();
      if (data.error) throw new Error(data.error);
      renderCount(data);
      lastSubmittedAt = data.submitted_at || null;
      return true;
    }
  } catch (e) {}
  document.getElementById('app').innerHTML = '<div class="empty-state"><h2>No counts yet</h2><p>Waiting for someone to submit an inventory count.</p></div>';
  return false;
}

async function loadArchiveList() {
  try {
    const resp = await fetch(API_BASE + '/archive');
    if (!resp.ok) return;
    const data = await resp.json();
    const picker = document.getElementById('archive-picker');
    const entries = data.entries || [];
    entries.forEach(e => {
      const opt = document.createElement('option');
      opt.value = e.file;
      const d = new Date(e.submitted_at);
      opt.textContent = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
        + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
        + ' (' + (e.device || '?') + ')';
      picker.appendChild(opt);
    });
  } catch (e) {}
}

function loadFromPicker() {
  const picker = document.getElementById('archive-picker');
  const file = picker.value;
  currentFile = file || null;
  const badge = document.getElementById('live-badge');
  if (file) {
    badge.style.display = 'none';
    stopPolling();
  } else {
    badge.style.display = '';
    startPolling();
  }
  loadCount(file || null);
}

async function checkForUpdate() {
  if (currentFile) return;
  try {
    const resp = await fetch(API_BASE + '/latest');
    if (!resp.ok) return;
    const data = await resp.json();
    if (data.submitted_at && data.submitted_at !== lastSubmittedAt) {
      renderCount(data);
      lastSubmittedAt = data.submitted_at;
      loadArchiveList();
      const badge = document.getElementById('live-badge');
      badge.textContent = 'Updated just now';
      badge.className = 'auto-badge';
      setTimeout(() => { badge.textContent = 'Live — auto-updating'; }, 3000);
    }
  } catch (e) {}
}

function startPolling() {
  stopPolling();
  pollTimer = setInterval(checkForUpdate, 60000);
}
function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const file = params.get('file');
  if (file) {
    currentFile = file;
    document.getElementById('archive-picker').value = file;
  }
  await loadCount(file || null);
  await loadArchiveList();
  if (file) {
    document.getElementById('archive-picker').value = file;
  }
  if (!currentFile) {
    document.getElementById('live-badge').style.display = '';
    startPolling();
  }
}

init();
</script>
</body>
</html>
