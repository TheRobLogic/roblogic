<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Count">
  <title>Inventory Count — Bancroft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Lora:ital,wght@0,400;0,700;1,400&family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a0a0a;
      --bg-elevated: #1e0e0e;
      --bg-card: #221414;
      --red: #b91c1c;
      --red-bright: #dc2626;
      --red-dark: #7f1d1d;
      --red-glow: rgba(185, 28, 28, 0.25);
      --cream: #ede0cc;
      --cream-dim: #9e9080;
      --gold: #c4a265;
      --green: #22c55e;
      --green-dim: #166534;
      --font-display: 'Alfa Slab One', cursive;
      --font-body: 'Lora', serif;
      --font-accent: 'Special Elite', system-ui;
      --topbar-h: 56px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      padding-top: var(--topbar-h);
    }

    /* ── TOP BAR ── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      background: var(--bg-elevated);
      border-bottom: 2px solid var(--red-dark);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      gap: 8px;
    }

    #topbar .title {
      font-family: var(--font-display);
      font-size: 20px;
      color: var(--cream);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    #progress {
      font-family: var(--font-accent);
      font-size: 13px;
      color: var(--cream-dim);
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    #submitBtn {
      font-family: var(--font-display);
      font-size: 13px;
      letter-spacing: 0.06em;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    #submitBtn:disabled {
      background: var(--red-dark);
      color: var(--cream-dim);
      cursor: not-allowed;
    }
    #submitBtn:not(:disabled):hover { background: var(--red-bright); }

    /* ── RESUME BANNER ── */
    #resumeBanner {
      background: var(--gold);
      color: var(--bg);
      text-align: center;
      padding: 8px;
      font-size: 14px;
      font-family: var(--font-accent);
      position: fixed;
      top: 56px; /* below topbar */
      left: 0; right: 0;
      z-index: 999;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }
    #resumeBanner button {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--bg);
    }

    /* ── SECTIONS ── */
    #sections {
      padding-bottom: 80px;
    }

    .section {
      border-bottom: 1px solid var(--red-dark);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      height: 48px;
      background: var(--red);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      gap: 8px;
    }
    .section-header:active { background: var(--red-bright); }

    .section-header .sec-name {
      font-family: var(--font-display);
      font-size: 15px;
      color: var(--cream);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .section-header .sec-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .sec-badge {
      font-family: var(--font-accent);
      font-size: 12px;
      color: rgba(237, 224, 204, 0.7);
      letter-spacing: 0.04em;
      background: rgba(0,0,0,0.25);
      border-radius: 10px;
      padding: 1px 8px;
    }

    .sec-arrow {
      font-size: 12px;
      color: rgba(237, 224, 204, 0.7);
      transition: transform 0.2s;
      display: inline-block;
    }

    .section.collapsed .sec-arrow {
      transform: rotate(-90deg);
    }

    .section-body {
      overflow: hidden;
    }
    .section.collapsed .section-body {
      display: none;
    }

    /* ── COLUMN HEADERS ── */
    .col-headers {
      display: flex;
      align-items: center;
      padding: 4px 12px 2px;
      background: var(--bg-elevated);
      border-bottom: 1px solid rgba(185,28,28,0.2);
      gap: 4px;
    }

    .col-headers .col-name-spacer {
      flex: 1;
      min-width: 0;
    }

    .col-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 48px;
      flex-shrink: 0;
    }

    .col-header .col-label {
      font-family: var(--font-accent);
      font-size: 10px;
      color: var(--cream-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 1.2;
    }
    .col-header .col-sublabel {
      font-size: 9px;
      color: rgba(158,144,128,0.6);
      line-height: 1.1;
    }

    /* ── ITEM ROWS ── */
    .item-row {
      display: flex;
      align-items: center;
      padding: 0 12px;
      min-height: 48px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      gap: 4px;
      background: var(--bg-card);
      transition: border-left-color 0.1s;
    }

    .item-row:nth-child(even) {
      background: var(--bg);
    }

    .item-row.counted {
      border-left: 3px solid var(--green-dim);
    }

    .item-name {
      flex: 1;
      min-width: 0;
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--cream);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 4px;
    }

    .item-inputs {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      align-items: center;
      overflow-x: auto;
    }

    /* ── NUMBER INPUTS ── */
    .count-input {
      width: 48px;
      height: 40px;
      text-align: center;
      background: var(--bg-card);
      color: var(--cream);
      border: 1px solid var(--cream-dim);
      border-radius: 4px;
      font-family: var(--font-accent);
      font-size: 16px;
      -moz-appearance: textfield;
      appearance: textfield;
    }
    .count-input::-webkit-inner-spin-button,
    .count-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .count-input:focus {
      outline: none;
      border-color: var(--gold);
    }
    .count-input::placeholder { color: rgba(158,144,128,0.35); }

    /* ── CYCLE BUTTONS (keg / fill) ── */
    .cycle-btn {
      width: 48px;
      height: 40px;
      background: var(--bg-card);
      border: 1px solid var(--cream-dim);
      border-radius: 4px;
      color: var(--cream-dim);
      font-family: var(--font-accent);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation; /* remove 300ms tap delay on older mobile browsers */
      transition: border-color 0.1s, color 0.1s;
    }
    .cycle-btn:focus { outline: none; border-color: var(--gold); }
    .cycle-btn.has-value {
      color: var(--gold);
      border-color: var(--gold);
      background: rgba(196,162,101,0.08);
    }

    /* ── ADD ITEM ROW ── */
    .add-row {
      display: flex;
      align-items: center;
      padding: 0 12px;
      min-height: 48px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      gap: 4px;
      background: var(--bg-elevated);
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .add-row:focus-within { opacity: 1; }

    .add-icon {
      font-size: 18px;
      color: var(--gold);
      flex-shrink: 0;
      width: 20px;
      text-align: center;
      font-family: var(--font-body);
    }

    .add-name-input {
      flex: 1;
      min-width: 0;
      height: 40px;
      background: transparent;
      border: none;
      border-bottom: 1px dashed var(--cream-dim);
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 16px; /* 16px min to prevent iOS auto-zoom */
      padding: 0 4px;
    }
    .add-name-input:focus { outline: none; border-bottom-color: var(--gold); }
    .add-name-input::placeholder { color: rgba(158,144,128,0.4); font-style: italic; }

    /* ── FOOTER ── */
    #footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg-elevated);
      border-top: 1px solid var(--red-dark);
      padding: 10px 16px;
      display: flex;
      justify-content: center;
      z-index: 999;
    }

    #clearBtn {
      font-family: var(--font-accent);
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: transparent;
      color: var(--cream-dim);
      border: 1px solid var(--cream-dim);
      border-radius: 4px;
      padding: 7px 20px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #clearBtn:hover {
      color: var(--red-bright);
      border-color: var(--red-bright);
    }

    /* ── SUBMIT STATES ── */
    #submitBtn.sending { opacity: 0.6; cursor: wait; }
    #submitBtn.sent { background: var(--green); border-color: var(--green); }
    #submitBtn.error { background: var(--red-bright); }

    .success-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .success-content {
      text-align: center;
      color: var(--cream);
      font-family: var(--font-body);
    }
    .success-check {
      font-size: 72px;
      color: var(--green);
      width: 120px;
      height: 120px;
      line-height: 120px;
      border: 4px solid var(--green);
      border-radius: 50%;
      margin: 0 auto 24px;
      font-family: var(--font-display);
    }
    .success-content h2 {
      font-family: var(--font-display);
      font-size: 24px;
      margin-bottom: 8px;
    }
    .success-content p {
      color: var(--cream-dim);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 430px) {
      .count-input, .cycle-btn { width: 44px; }
      .col-header { width: 44px; }
    }
    @media (max-width: 380px) {
      .item-name { font-size: 13px; }
      .count-input, .cycle-btn { width: 40px; font-size: 15px; }
      .col-header { width: 40px; }
    }
  </style>
</head>

// Keg fill states (cycles: empty → F → ½ → ¼ → K → empty)
const KEG_STATES = ['', 'F', '½', '¼', 'K'];
// Fill states for well (cycles: empty → F → ½ → ¼ → empty)
const FILL_STATES = ['', 'F', '½', '¼'];

function totalItems() {
  return INVENTORY.reduce((acc, sec) => acc + sec.items.length, 0);
}

// itemIndex defaults to 'add' (for add-item rows) when not provided
function makeInput(col, sectionId, itemIndex) {
  const idx = itemIndex !== undefined ? itemIndex : 'add';
  const isAddRow = itemIndex === undefined;
  if (col.inputType === 'number') {
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.inputMode = 'numeric';
    inp.pattern = '[0-9]*';
    inp.className = 'count-input' + (isAddRow ? ' add-input' : '');
    inp.dataset.col = col.key;
    inp.dataset.section = sectionId;
    inp.dataset.index = idx;
    inp.placeholder = '—';
    inp.min = '0';
    return inp;
  } else {
    // cycle button (keg or fill)
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'cycle-btn' + (isAddRow ? ' add-input' : '');
    btn.dataset.col = col.key;
    btn.dataset.type = col.inputType;
    btn.dataset.section = sectionId;
    btn.dataset.index = idx;
    btn.dataset.stateIndex = '0';
    btn.textContent = '';
    return btn;
  }
}

function renderSections() {
  const container = document.getElementById('sections');
  container.innerHTML = '';

  INVENTORY.forEach((sec, secIdx) => {
    const section = document.createElement('div');
    section.className = 'section' + (secIdx === 0 ? '' : ' collapsed');
    section.id = 'sec-' + sec.id;

    // ── Header
    const header = document.createElement('div');
    header.className = 'section-header';

    const nameSpan = document.createElement('span');
    nameSpan.className = 'sec-name';
    nameSpan.textContent = sec.name;

    const meta = document.createElement('span');
    meta.className = 'sec-meta';

    const badge = document.createElement('span');
    badge.className = 'sec-badge';
    badge.id = 'badge-' + sec.id;
    badge.textContent = '0/' + sec.items.length;

    const arrow = document.createElement('span');
    arrow.className = 'sec-arrow';
    arrow.textContent = '▼';

    meta.appendChild(badge);
    meta.appendChild(arrow);
    header.appendChild(nameSpan);
    header.appendChild(meta);

    // ── Body
    const body = document.createElement('div');
    body.className = 'section-body';

    // Column headers row
    const colHeaders = document.createElement('div');
    colHeaders.className = 'col-headers';

    const nameSpacer = document.createElement('div');
    nameSpacer.className = 'col-name-spacer';
    colHeaders.appendChild(nameSpacer);

    sec.columns.forEach(col => {
      const ch = document.createElement('div');
      ch.className = 'col-header';

      const lbl = document.createElement('span');
      lbl.className = 'col-label';
      lbl.textContent = col.label;
      ch.appendChild(lbl);

      if (col.sublabel) {
        const sub = document.createElement('span');
        sub.className = 'col-sublabel';
        sub.textContent = col.sublabel;
        ch.appendChild(sub);
      }

      colHeaders.appendChild(ch);
    });

    body.appendChild(colHeaders);

    // Item rows
    sec.items.forEach((itemName, itemIdx) => {
      const row = document.createElement('div');
      row.className = 'item-row';
      row.dataset.section = sec.id;
      row.dataset.index = itemIdx;

      const nameEl = document.createElement('span');
      nameEl.className = 'item-name';
      nameEl.textContent = itemName;
      row.appendChild(nameEl);

      const inputs = document.createElement('div');
      inputs.className = 'item-inputs';

      sec.columns.forEach(col => {
        inputs.appendChild(makeInput(col, sec.id, itemIdx));
      });

      row.appendChild(inputs);
      body.appendChild(row);
    });

    // Add-item row
    const addRow = document.createElement('div');
    addRow.className = 'add-row';
    addRow.dataset.section = sec.id;

    const addIcon = document.createElement('span');
    addIcon.className = 'add-icon';
    addIcon.textContent = '+';
    addRow.appendChild(addIcon);

    const addNameInput = document.createElement('input');
    addNameInput.type = 'text';
    addNameInput.className = 'add-name-input';
    addNameInput.placeholder = 'Add item…';
    addNameInput.dataset.section = sec.id;
    addRow.appendChild(addNameInput);

    const addInputs = document.createElement('div');
    addInputs.className = 'item-inputs';

    sec.columns.forEach(col => {
      addInputs.appendChild(makeInput(col, sec.id));
    });

    addRow.appendChild(addInputs);
    body.appendChild(addRow);

    section.appendChild(header);
    section.appendChild(body);
    container.appendChild(section);
  });

  updateProgress();
}

function updateProgress() {
  const total = totalItems();
  let counted = 0;

  INVENTORY.forEach(sec => {
    let sectionCounted = 0;
    const sectionTotal = sec.items.length;

    sec.items.forEach((_, itemIdx) => {
      const row = document.querySelector(`.item-row[data-section="${sec.id}"][data-index="${itemIdx}"]`);
      if (!row) return;

      // Check number inputs
      const inputs = row.querySelectorAll('.count-input');
      // Check cycle buttons
      const btns = row.querySelectorAll('.cycle-btn');

      let hasValue = false;
      inputs.forEach(inp => { if (inp.value !== '') hasValue = true; });
      btns.forEach(btn => { if (btn.textContent !== '') hasValue = true; });

      if (hasValue) {
        sectionCounted++;
        counted++;
        row.classList.add('counted');
      } else {
        row.classList.remove('counted');
      }
    });

    const badge = document.getElementById('badge-' + sec.id);
    if (badge) badge.textContent = sectionCounted + '/' + sectionTotal;
  });

  document.getElementById('progress').textContent = counted + ' / ' + total;

  const submitBtn = document.getElementById('submitBtn');
  if (submitBtn && !submitBtn.classList.contains('sent')) {
    submitBtn.disabled = (counted === 0);
  }
}

// ── localStorage persistence ──────────────────────────────────────────────────

const STORAGE_KEY = 'bancroft_inventory_draft';
let saveTimeout = null;

function saveToLocal() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    const data = collectAllData();
    data._savedAt = new Date().toISOString();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }, 500);
}

function collectAllData() {
  const result = { sections: {}, addedItems: {} };

  INVENTORY.forEach(sec => {
    const secData = {};

    // Regular item rows
    sec.items.forEach((itemName, itemIdx) => {
      const row = document.querySelector(`.item-row[data-section="${sec.id}"][data-index="${itemIdx}"]`);
      if (!row) return;

      const entry = {};
      let hasValue = false;

      row.querySelectorAll('.count-input').forEach(inp => {
        if (inp.value !== '') { entry[inp.dataset.col] = inp.value; hasValue = true; }
      });
      row.querySelectorAll('.cycle-btn').forEach(btn => {
        if (btn.textContent !== '') { entry[btn.dataset.col] = btn.textContent; hasValue = true; }
      });

      if (hasValue) secData[itemName] = entry;
    });

    result.sections[sec.id] = secData;

    // Add-row
    const addRow = document.querySelector(`.add-row[data-section="${sec.id}"]`);
    if (addRow) {
      const nameInput = addRow.querySelector('.add-name-input');
      const name = nameInput ? nameInput.value.trim() : '';
      if (name) {
        const entry = { name };
        addRow.querySelectorAll('.add-input.count-input').forEach(inp => {
          if (inp.value !== '') entry[inp.dataset.col] = inp.value;
        });
        addRow.querySelectorAll('.add-input.cycle-btn').forEach(btn => {
          if (btn.textContent !== '') entry[btn.dataset.col] = btn.textContent;
        });
        if (!result.addedItems[sec.id]) result.addedItems[sec.id] = [];
        result.addedItems[sec.id].push(entry);
      }
    }
  });

  return result;
}

function restoreFromLocal() {
  let raw;
  try { raw = localStorage.getItem(STORAGE_KEY); } catch (e) { return; }
  if (!raw) return;

  let data;
  try { data = JSON.parse(raw); } catch (e) { return; }
  if (!data || !data.sections) return;

  const KEG_VALUES  = ['', 'F', '\u00bd', '\u00bc', 'K'];
  const FILL_VALUES = ['', 'F', '\u00bd', '\u00bc'];

  let anyRestored = false;

  INVENTORY.forEach(sec => {
    const secData = data.sections[sec.id];
    if (!secData) return;

    sec.items.forEach((itemName, itemIdx) => {
      const saved = secData[itemName];
      if (!saved) return;

      const row = document.querySelector(`.item-row[data-section="${sec.id}"][data-index="${itemIdx}"]`);
      if (!row) return;

      row.querySelectorAll('.count-input').forEach(inp => {
        const val = saved[inp.dataset.col];
        if (val !== undefined) { inp.value = val; anyRestored = true; }
      });
      row.querySelectorAll('.cycle-btn').forEach(btn => {
        const val = saved[btn.dataset.col];
        if (val !== undefined) {
          btn.textContent = val;
          const validStates = btn.dataset.type === 'keg' ? KEG_VALUES : FILL_VALUES;
          btn.classList.toggle('has-value', validStates.indexOf(val) > 0);
          anyRestored = true;
        }
      });
    });

    // Restore add-row
    const addedList = data.addedItems && data.addedItems[sec.id];
    if (addedList && addedList.length > 0) {
      const addRow = document.querySelector(`.add-row[data-section="${sec.id}"]`);
      if (addRow) {
        const nameInput = addRow.querySelector('.add-name-input');
        const first = addedList[0];
        if (nameInput && first && first.name) {
          nameInput.value = first.name;
          addRow.querySelectorAll('.add-input.count-input').forEach(inp => {
            const val = first[inp.dataset.col];
            if (val !== undefined) inp.value = val;
          });
          addRow.querySelectorAll('.add-input.cycle-btn').forEach(btn => {
            const val = first[btn.dataset.col];
            if (val !== undefined) {
              btn.textContent = val;
              const validStates = btn.dataset.type === 'keg' ? KEG_VALUES : FILL_VALUES;
              btn.classList.toggle('has-value', validStates.indexOf(val) > 0);
            }
          });
          anyRestored = true;
        }
      }
    }
  });

  if (anyRestored && data._savedAt) {
    const banner = document.getElementById('resumeBanner');
    const ts = new Date(data._savedAt);
    const timeStr = ts.toLocaleDateString([], { month: 'short', day: 'numeric' })
      + ' ' + ts.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    banner.innerHTML = '<span>Draft restored from ' + timeStr + '</span>'
      + '<button id="dismissBanner" title="Dismiss">\u00d7</button>';
    banner.style.display = 'flex';
    document.getElementById('dismissBanner').addEventListener('click', () => {
      banner.style.display = 'none';
    });
  }
}

function buildPayload() {
  const params = new URLSearchParams(window.location.search);
  const device = params.get('device') || 'unknown';
  const allData = collectAllData();
  const totalItems = INVENTORY.reduce((sum, s) => sum + s.items.length, 0);

  const sections = {};
  INVENTORY.forEach(section => {
    const sectionData = allData.sections[section.id] || {};
    const items = [];
    section.items.forEach(name => {
      if (sectionData[name]) {
        items.push({ name, ...sectionData[name] });
      }
    });
    const added = (allData.addedItems[section.id] || []);
    sections[section.id] = { items, added };
  });

  let counted = 0;
  INVENTORY.forEach(section => {
    const sectionData = allData.sections[section.id] || {};
    section.items.forEach(name => {
      if (sectionData[name]) counted++;
    });
  });

  return {
    submitted_at: new Date().toISOString(),
    device,
    sections,
    progress: { counted, total: totalItems },
    notes: ''
  };
}

function showOverlay(title, subtitle) {
  const overlay = document.createElement('div');
  overlay.className = 'success-overlay';
  overlay.innerHTML = '<div class="success-content">' +
    '<div class="success-check">\u2713</div>' +
    '<h2>' + title + '</h2>' +
    '<p>' + subtitle + '</p>' +
    '</div>';
  document.body.appendChild(overlay);
}

document.addEventListener('DOMContentLoaded', () => {
  renderSections();
  restoreFromLocal();
  updateProgress();

  const KEG_VALUES  = ['', 'F', '\u00bd', '\u00bc', 'K'];
  const FILL_VALUES = ['', 'F', '\u00bd', '\u00bc'];

  document.getElementById('sections').addEventListener('input', () => {
    saveToLocal();
    updateProgress();
  });

  // Scroll focused input into view when iOS keyboard appears
  document.getElementById('sections').addEventListener('focus', (e) => {
    if (e.target.matches('.count-input, .add-name-input')) {
      setTimeout(() => e.target.scrollIntoView({ block: 'center', behavior: 'smooth' }), 300);
    }
  }, true); // capture phase so focus events bubble up

  document.getElementById('sections').addEventListener('click', (e) => {
    // Cycle button takes priority — check it first
    const btn = e.target.closest('.cycle-btn');
    if (btn) {
      const values = btn.dataset.type === 'keg' ? KEG_VALUES : FILL_VALUES;
      const currentIdx = values.indexOf(btn.textContent);
      const nextIdx = (currentIdx + 1) % values.length;
      btn.textContent = values[nextIdx];
      btn.classList.toggle('has-value', nextIdx > 0);
      saveToLocal();
      updateProgress();
      return; // don't bubble to section toggle
    }

    // Section header toggle
    const header = e.target.closest('.section-header');
    if (!header) return;
    const section = header.closest('.section');
    section.classList.toggle('collapsed');
  });

  // ── Submit handler ────────────────────────────────────────────────────────
  document.getElementById('submitBtn').addEventListener('click', async () => {
    const btn = document.getElementById('submitBtn');
    if (btn.disabled) return;

    btn.disabled = true;
    btn.textContent = 'SENDING...';
    btn.classList.add('sending');

    try {
      const payload = buildPayload();
      const resp = await fetch('https://n8n.roblogic.org/webhook/inventory', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!resp.ok) throw new Error('Server returned ' + resp.status);

      // Success
      localStorage.removeItem(STORAGE_KEY);
      btn.textContent = 'SENT \u2713';
      btn.classList.remove('sending');
      btn.classList.add('sent');
      showOverlay('Inventory submitted!', 'Count has been sent.');

    } catch (err) {
      // Failure — keep data intact
      btn.disabled = false;
      btn.textContent = 'RETRY';
      btn.classList.remove('sending');
      btn.classList.add('error');
      alert('Failed to send: ' + err.message + '\n\nYour data is saved. Try again when you have signal.');
    }
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!confirm('Clear all counts and start over?')) return;
    localStorage.removeItem(STORAGE_KEY);
    document.querySelectorAll('.count-input').forEach(i => i.value = '');
    document.querySelectorAll('.cycle-btn').forEach(b => { b.textContent = ''; b.classList.remove('has-value'); });
    document.querySelectorAll('.add-name-input').forEach(i => i.value = '');
    document.getElementById('resumeBanner').style.display = 'none';
    updateProgress();
  });
});
</script>
